steps:
  - name: 'mcr.microsoft.com/dotnet/sdk:10.0'
    dir: 'backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        dotnet tool install --global dotnet-ef
        export PATH="$$PATH:$$HOME/.dotnet/tools"
        
        cd AchievementOffice

        dotnet restore

        dotnet ef database update --connection "$_DB_CONNECTION_STRING"
        
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE_NAME:$TAG_NAME'
      - '-f'
      - 'backend/Dockerfile.prod'
      - 'backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE_NAME:$TAG_NAME'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE_NAME:$TAG_NAME'
      - '--region'
      - '$_REGION'
options:
  logging: CLOUD_LOGGING_ONLY