name: AchievementOffice

services:
  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=achievement_office
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  backend:
    build: 
      context: ./backend
    ports: 
      - "8080:8080"
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=achievement_office;Username=user;Password=postgres
      - DOTNET_WATCH_NON_INTERACTIVE=true
    volumes:
      - ./backend:/app
  frontend:
    build: 
      context: ./frontend
    ports: 
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  db_data: